services:
  inventory-db:
    image: mysql:8.4 # Using the 2026 LTS version
    container_name: inventory_mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: inventory_db
      MYSQL_ROOT_PASSWORD: 1234 # Match your current password
    volumes:
      - ./database/data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    # --- ADD THIS: HEALTHCHECK ---
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- ADD THIS: BACKEND SERVICE ---
  backend:
    build: ./backend
    container_name: inventory_backend
    depends_on:
      inventory-db:
        condition: service_healthy # Only starts when DB is truly ready
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://inventory-db:3306/inventory_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
