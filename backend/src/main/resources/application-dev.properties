
# Database Configuration for your Local Docker/DBeaver
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234

# JPA / Hibernate properties for Dev (Safe to auto-update)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Allow local Vue dev server, change base frontend url
app.cors.origins=http://localhost:5173